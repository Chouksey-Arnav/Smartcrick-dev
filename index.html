  <script>
    // Remove splash when React renders content into #root
    (function() {
      var loader = document.getElementById('sc-loading');
      if (!loader) return;
      var ob = new MutationObserver(function() {
        var r = document.getElementById('root');
        if (r && r.children.length > 0) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s ease';
          setTimeout(function() {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 350);
          ob.disconnect();
        }
      });
      var root = document.getElementById('root');
      if (root) ob.observe(root, { childList: true });
      setTimeout(function() {
        if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
      }, 8000);
    })();
  </script>

  <!-- ── OFFLINE SUPPORT: register service worker (silent, automatic) ── -->
  <script>
    (function() {
      // Register the service worker so the entire app shell, scripts,
      // styles and CDN libraries are cached for full offline use. No
      // user-facing "you're offline" messaging — caching + cache-fallback
      // in sw.js makes the app keep working transparently when the
      // network is unavailable, and local data (DB.* in app-core.js)
      // already persists everything to localStorage regardless of
      // connectivity.
      if ('serviceWorker' in navigator) {
        // When a new service worker takes control (i.e. a fresh deploy was
        // installed), reload ONCE so the page renders with the new assets.
        // Without this, an updated app can keep showing the old UI until the
        // user manually reloads again.
        var scRefreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (scRefreshing) return;
          scRefreshing = true;
          window.location.reload();
        });
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('[SW] Registered —', reg.scope);
              // When a new version is found, activate it immediately.
              reg.addEventListener('updatefound', function() {
                var sw = reg.installing;
                if (!sw) return;
                sw.addEventListener('statechange', function() {
                  if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                    sw.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
            })
            .catch(function(e) { console.warn('[SW] Registration failed', e); });
        });
      }
    })();
  </script>
