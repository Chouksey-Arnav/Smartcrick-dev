<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SmartCrick AI" />
  <title>SmartCrick AI — Train. Measure. Improve.</title>
  <meta name="description" content="AI-powered cricket training: drills, mental sessions, fitness, and smart scheduling." />

  <!-- Performance preconnects -->
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- React 18 UMD — synchronous (no defer) so window.React is  -->
  <!-- available before any deferred scripts execute              -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Canvas Confetti -->
  <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- GSAP 3 + ScrollTrigger plugin                              -->
  <!-- Version 3.13.0 — stable, free tier, jsDelivr CDN          -->
  <!-- defer = executes in order AFTER HTML parses                -->
  <!-- SCAnim.init() guards against GSAP not loading             -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- Main app — loaded AFTER React + GSAP via defer             -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <script defer src="app.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root">
    <!-- Loading splash shown while scripts load -->
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;background:#0d1117;gap:20px;">
      <div style="width:64px;height:64px;border-radius:16px;background:#16a34a;display:flex;align-items:center;justify-content:center;">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 21l3.5-3.5"/>
          <path d="M5.5 19.5L16 9a2 2 0 0 0 0-2.83L14.83 5A2 2 0 0 0 12 5L2.5 16l-1 1 1 4z"/>
          <path d="M19 4.5l.5.5"/>
          <circle cx="20" cy="4" r="1"/>
        </svg>
      </div>
      <div style="font-family:system-ui,sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.02em;">SMARTCRICK AI</div>
      <div style="width:40px;height:40px;border:4px solid rgba(30,41,59,0.8);border-top-color:#10b981;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
    </div>
  </div>

  <style>
    @keyframes spin{to{transform:rotate(360deg)}}
    body{margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  </style>
</body>
</html>
