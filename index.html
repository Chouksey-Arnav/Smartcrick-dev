  <style>
    /* ── CRITICAL LAYOUT STYLES ── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0d1117; width: 100%; }
    #root { min-height: 100dvh; background: #0d1117; width: 100%; }

    /* Desktop sidebar placeholder */
    .sc-desktop-sidebar {
      display: none;
      flex-shrink: 0;
      width: 260px;
      position: sticky;
      top: 0;
      height: 100dvh;
      overflow: hidden;
    }
    @media (min-width: 768px) {
      .sc-desktop-sidebar { display: block; }
    }

    /* Mobile-only — hidden on desktop */
    .sc-mobile-only { display: block; }
    @media (min-width: 768px) {
      .sc-mobile-only { display: none !important; }
      .pb-28 { padding-bottom: 2rem !important; }
    }

    /* Splash loader */
    #sc-loading {
      position: fixed; inset: 0; background: #0d1117;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 9999;
    }
    #sc-loading .sc-logo  { font-size: 3rem; margin-bottom: 1rem; }
    #sc-loading .sc-name  { font-family: 'Inter', system-ui, sans-serif; font-size: 1.5rem; font-weight: 900; color: #f0fdf4; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
    #sc-loading .sc-sub   { font-family: 'Inter', system-ui, sans-serif; font-size: 0.75rem; color: #484f58; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    #sc-loading .sc-dots  { display: flex; gap: 6px; margin-top: 2rem; }
    #sc-loading .sc-dot   { width: 8px; height: 8px; border-radius: 50%; background: #16a34a; animation: scDotPulse 1.2s ease-in-out infinite; }
    #sc-loading .sc-dot:nth-child(2) { animation-delay: 0.2s; }
    #sc-loading .sc-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes scDotPulse { 0%, 100% { opacity: 0.2; transform: scale(0.7); } 50% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>

  <div id="sc-loading" role="status" aria-label="Loading SmartCrick">
    <div class="sc-logo" aria-hidden="true">🏏</div>
    <div class="sc-name">SmartCrick</div>
    <div class="sc-sub">Elite Cricket Training</div>
    <div class="sc-dots" aria-hidden="true">

         app-home.js updated (v4.1) — use the new file

  <script>
    // Remove splash when React renders content into #root
    (function() {
      var loader = document.getElementById('sc-loading');
      if (!loader) return;
      var ob = new MutationObserver(function() {
        var r = document.getElementById('root');
        if (r && r.children.length > 0) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s ease';
          setTimeout(function() {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 350);
          ob.disconnect();
        }
      });
      var root = document.getElementById('root');
      if (root) ob.observe(root, { childList: true });
      setTimeout(function() {
        if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
      }, 8000);
    })();
  </script>
</body>
