  <!--
    ╔══════════════════════════════════════════════════╗
    ║  SCRIPT LOAD ORDER IS CRITICAL — DO NOT CHANGE  ║
    ╚══════════════════════════════════════════════════╝
    1. sc_opensource.js  — open-source bridges
    2. app-core.js       — DB, XP, router, helpers
    3. app-data.js       — drills, sessions, workouts, 30-day data
    4. app-ui.js         — shared components
    5. app-onboard.js    — onboarding wizard
    6. app-assessment.js — skill radar
    7. app-home.js       — home page
    8. app-drills.js     — drill system
    9. app-mental.js     — mental training
    10. app-fitness.js   — workouts
    11. app-timer.js     — timers
    12. app-schedule.js  — schedule (CORRECT file — not ProfilePage)
    13. app-skillpaths.js
    14. app-progress.js
    15. app-challenges.js
    16. app-profile.js
    17. app-stubs.js
    18. app-aicoach.js   — AI Coach (overrides stub)
    19. app-daily-net.js — Daily Net feature
    20. app-viral.js     — Cricket DNA
    21. app-root.js      — MUST BE LAST (single IIFE, single root.render)
  -->
  <script src="sc_opensource.js"></script>
  <script src="app-core.js"></script>
  <script src="app-data.js"></script>
  <script src="app-ui.js"></script>
  <script src="app-onboard.js"></script>
  <script src="app-assessment.js"></script>
  <script src="app-home.js"></script>
  <script src="app-drills.js"></script>

  <script src="app-schedule.js"></script>
  <script src="app-skillpaths.js"></script>
  <script src="app-progress.js"></script>
  <script src="app-challenges.js"></script>
  <script src="app-profile.js"></script>
  <script src="app-stubs.js"></script>
  <script src="app-aicoach.js"></script>
  <script src="app-daily-net.js"></script>
  <script src="app-viral.js"></script>
  <script src="app-root.js"></script>

  <style>
    #root { min-height:100dvh; background:#0d1117; }
    #sc-loading {
      position:fixed; inset:0; background:#0d1117;
      display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999;
    }
    #sc-loading .logo  { font-size:3rem; margin-bottom:1rem; }
    #sc-loading .name  { font-family:'Inter',system-ui,sans-serif; font-size:1.5rem; font-weight:900; color:#f0fdf4; letter-spacing:-.03em; margin-bottom:.5rem; }
    #sc-loading .sub   { font-family:'Inter',system-ui,sans-serif; font-size:.75rem; color:#484f58; font-weight:600; text-transform:uppercase; letter-spacing:.08em; }
    #sc-loading .dots  { display:flex; gap:6px; margin-top:2rem; }
    #sc-loading .dot   { width:8px; height:8px; border-radius:50%; background:#16a34a; animation:lp 1.2s ease-in-out infinite; }
    #sc-loading .dot:nth-child(2) { animation-delay:.2s; }
    #sc-loading .dot:nth-child(3) { animation-delay:.4s; }
    @keyframes lp { 0%,100%{opacity:.2;transform:scale(.7)} 50%{opacity:1;transform:scale(1)} }
  </style>
</head>
<body>
  <div id="sc-loading">
    <div class="logo">🏏</div>
    <div class="name">SmartCrick AI</div>
    <div class="sub">Elite Cricket Training</div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
  <div id="root"></div>
  <script>
    (function(){
      var ob = new MutationObserver(function(){
        var r = document.getElementById('root');
        if (r && r.children.length > 0) {
          var l = document.getElementById('sc-loading');
          if (l) { l.style.opacity='0'; l.style.transition='opacity .3s'; setTimeout(function(){ if(l.parentNode)l.remove(); },350); }
          ob.disconnect();
        }
      });
      var r = document.getElementById('root');
      if (r) ob.observe(r,{childList:true});
      setTimeout(function(){ var l=document.getElementById('sc-loading'); if(l&&l.parentNode)l.remove(); },6000);
    })();
  </script>
</body>
</html>
